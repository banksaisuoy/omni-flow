name: Auto Merge Jules PRs

on:
  pull_request:
    types: [opened, reopened, synchronized]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.user.login == 'google-labs-jules[bot]' ||
      startsWith(github.event.pull_request.head.ref, 'jules-') ||
      contains(github.event.pull_request.body, 'PR created automatically by Jules')
    steps:
      - name: Auto Merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.html_url }} --merge --delete-branch || \
          gh pr merge ${{ github.event.pull_request.html_url }} --merge --admin --delete-branch
